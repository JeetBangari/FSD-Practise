<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width initial-scale=1.0">
    <title>Interactive Quiz Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button id="start">Start Quiz</button>
        <h2 id="question" style="display: none;">Questions</h2>
        <button class="btn" onclick="checkAnswer('A')" id="btnA" style="display: none;"></button>
        <button class="btn" onclick="checkAnswer('B')" id="btnB" style="display: none;"></button>
        <button class="btn" onclick="checkAnswer('C')" id="btnC" style="display: none;"></button>
        <button class="btn" onclick="checkAnswer('D')" id="btnD" style="display: none;"></button>
        <button id="next-btn" style="display:none">Next</button>
        <h3 id="result"></h3>
        <button id="reset" style="display: none;">Reset</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
